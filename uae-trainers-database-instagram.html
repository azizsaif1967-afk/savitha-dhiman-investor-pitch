const seen = new Set();
const unique = profiles.filter(t => { if (seen.has(t.u)) return false; seen.add(t.u); return true; });
const grid = document.getElementById('grid');
const stats = document.getElementById('stats');

function getLocClass(l) { const m = {dubai:'loc-dubai',abudhabi:'loc-abudhabi',sharjah:'loc-sharjah',ajman:'loc-ajman',alain:'loc-alain',rak:'loc-rak',fujairah:'loc-fujairah',uae:'loc-uae'}; return m[l]||''; }
function getLocLabel(l) { const m = {dubai:'Dubai',abudhabi:'Abu Dhabi',sharjah:'Sharjah',ajman:'Ajman',alain:'Al Ain',rak:'RAK',fujairah:'Fujairah',uae:'UAE-wide'}; return m[l]||l; }
function getCatClass(c) { const m = {pt:'cat-pt',gym:'cat-gym',boxing:'cat-boxing',yoga:'cat-yoga',crossfit:'cat-crossfit',bodybuilding:'cat-bodybuilding',online:'cat-online',nutrition:'cat-nutrition',female:'cat-female',studio:'cat-studio'}; return m[c]||''; }
function getCatLabel(c) { const m = {pt:'Personal Trainer',gym:'Gym/Studio',boxing:'Boxing/MMA',yoga:'Yoga/Pilates',crossfit:'CrossFit/HIIT',bodybuilding:'Bodybuilding/IFBB',online:'Online Coach',nutrition:'Nutrition',female:'Female Specialist',studio:'Fitness Center'}; return m[c]||c; }

function renderCards(list) {
  grid.innerHTML = '';
  let emailCount = list.filter(t=>t.e).length;
  let phoneCount = list.filter(t=>t.p).length;
  let noSiteCount = list.filter(t=>!t.w).length;
  list.forEach((t, i) => {
    const initials = t.u.substring(0,2).toUpperCase();
    const card = document.createElement('div');
    card.className = 'card';
    let contactHTML = '';
    if (t.e) contactHTML += `<span class="contact-badge badge-email" title="${t.e}">&#9993; ${t.e}</span>`;
    if (t.p) contactHTML += `<span class="contact-badge badge-phone" title="${t.p}">&#9742; ${t.p}</span>`;
    if (t.w) contactHTML += `<span class="contact-badge badge-website"><a href="https://${t.w}" target="_blank" style="color:inherit;text-decoration:none;">&#127760; ${t.w}</a></span>`;
    else contactHTML += `<span class="contact-badge badge-nosite">&#10060; No Website</span>`;
    if (t.f) contactHTML += `<span class="contact-badge badge-followers">&#128101; ${t.f}</span>`;
    card.innerHTML = `<div class="num">#${i+1}</div><div class="handle-row"><div class="avatar">${initials}</div><div><a class="handle" href="https://instagram.com/${t.u}" target="_blank" rel="noopener">@${t.u}</a></div></div><div class="desc">${t.d}</div><div class="contact-row">${contactHTML}</div><div class="tags"><span class="tag ${getLocClass(t.l)}">${getLocLabel(t.l)}</span><span class="tag ${getCatClass(t.c)}">${getCatLabel(t.c)}</span></div>`;
    grid.appendChild(card);
  });
  stats.innerHTML = `Showing <strong>${list.length}</strong> of ${unique.length} profiles | <strong>${emailCount}</strong> with email | <strong>${phoneCount}</strong> with phone | <strong>${noSiteCount}</strong> without website`;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const loc = document.getElementById('locFilter').value;
  const has = document.getElementById('hasEmail').value;
  const filtered = unique.filter(t => {
    if (q && !t.u.toLowerCase().includes(q) && !t.d.toLowerCase().includes(q) && !(t.e && t.e.toLowerCase().includes(q))) return false;
    if (cat && t.c !== cat) return false;
    if (loc && t.l !== loc) return false;
    if (has === 'email' && !t.e) return false;
    if (has === 'phone' && !t.p) return false;
    if (has === 'nosite' && t.w) return false;
    if (has === 'website' && !t.w) return false;
    return true;
  });
  renderCards(filtered);
}

function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.style.display = 'block';
  setTimeout(() => toast.style.display = 'none', 2500);
}

function exportCSV() {
  const headers = 'Handle,Name/Description,Category,Location,Email,Phone,Website,Followers,Instagram URL\n';
  const rows = unique.map(t => `"@${t.u}","${t.d.replace(/"/g,'""')}","${getCatLabel(t.c)}","${getLocLabel(t.l)}","${t.e}","${t.p}","${t.w}","${t.f}","https://instagram.com/${t.u}"`).join('\n');
  const blob = new Blob([headers + rows], {type:'text/csv'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'uae_trainers_database.csv';
  a.click();
  showToast('CSV exported with ' + unique.length + ' profiles!');
}

function copyEmails() {
  const emails = unique.filter(t => t.e).map(t => t.e).join('\n');
  navigator.clipboard.writeText(emails);
  showToast('Copied ' + unique.filter(t=>t.e).length + ' emails to clipboard!');
}

function copyHandles() {
  const handles = unique.map(t => '@' + t.u).join('\n');
  navigator.clipboard.writeText(handles);
  showToast('Copied ' + unique.length + ' handles to clipboard!');
}

function showEmailOnly() {
  document.getElementById('hasEmail').value = 'email';
  filterCards();
  showToast('Filtered to email-only profiles');
}

renderCards(unique);
</script>
