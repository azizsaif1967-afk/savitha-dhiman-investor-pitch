/* ===== FLOATING BRAND HERO ===== */
.hero-brand-section {
    position: relative;

    text-align: center;
    overflow: hidden;
    border-bottom: 3px solid #e1306c;
}
.hero-brand-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 600px 400px at 50% 50%, #e1306c11 0%, transparent 70%);
    pointer-events: none;
}
.hero-brand-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 900;
    color: rgba(255,255,255,0.025);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.05em;
    user-select: none;
    text-transform: uppercase;
}
.hero-brand-float {
    position: relative;
    z-index: 1;
    font-size: clamp(2.2rem, 7vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #e1306c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: brandFloat 4s ease-in-out infinite;
}
.hero-brand-section h1 {
    position: relative;
    z-index: 1;
}
.hero-brand-section .subtitle,
.hero-brand-section .sub {
    position: relative;
    z-index: 1;
}
@keyframes brandFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}

// Deduplicate by username
const seen = new Set();
const unique = gyms.filter(t => {
  if (seen.has(t.u)) return false;
  seen.add(t.u);
  return true;
});

const grid = document.getElementById('grid');
const stats = document.getElementById('stats');

function getLocClass(l) {
  const colored = ['toronto','vancouver','montreal','calgary','edmonton','ottawa','winnipeg','halifax'];
  return colored.includes(l) ? l : 'other';
}
function getLocLabel(l) {
  const map = {toronto:'Toronto & GTA',vancouver:'Vancouver',montreal:'Montreal',calgary:'Calgary',edmonton:'Edmonton',ottawa:'Ottawa',winnipeg:'Winnipeg',halifax:'Halifax',victoria:'Victoria',kelowna:'Kelowna',saskatoon:'Saskatoon',regina:'Regina',quebeccity:'Quebec City',london:'London ON',windsor:'Windsor ON',kitchener:'Kitchener-Waterloo',kingston:'Kingston',barrie:'Barrie',stjohns:"St. John's",fredericton:'Fredericton',charlottetown:'Charlottetown',whitehorse:'Whitehorse',yellowknife:'Yellowknife'};
  return map[l] || l;
}
function getCatLabel(c) {
  const map = {commercial:'Commercial Gym',boutique:'Boutique / Studio',crossfit:'CrossFit',powerlifting:'Powerlifting / Strength',women:"Women's Gym",'24hr':'24-Hour Gym',martial:'Martial Arts / Boxing',yoga:'Yoga / Dance / Pole',climbing:'Climbing',community:'Community / Recreation',other:'Other'};
  return map[c] || c;
}

function renderCards(list) {
  grid.innerHTML = '';
  list.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="num">#${i + 1}</div><a href="https://instagram.com/${t.u}" target="_blank" rel="noopener">@${t.u}</a><div class="desc">${t.d}</div><div class="tags"><span class="tag ${getLocClass(t.l)}">${getLocLabel(t.l)}</span><span class="tag">${getCatLabel(t.c)}</span></div>`;
    grid.appendChild(card);
  });
  stats.textContent = `Showing ${list.length} of ${unique.length} gyms & fitness centres across Canada`;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const loc = document.getElementById('locFilter').value;
  const filtered = unique.filter(t => {
    if (q && !t.u.toLowerCase().includes(q) && !t.d.toLowerCase().includes(q)) return false;
    if (cat && t.c !== cat) return false;
    if (loc && t.l !== loc) return false;
    return true;
  });
  renderCards(filtered);
}

renderCards(unique);
