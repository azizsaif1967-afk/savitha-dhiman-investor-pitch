    const catLabels={private:'Private Chef',home:'Home Chef',pastry:'Pastry Chef',cake:'Cake Artist',catering:'Catering',meal:'Meal Prep',food:'Food Truck',sushi:'Sushi/Japanese',bbq:'BBQ/Grill',vegan:'Vegan/Healthy',cooking:'Cooking Class',supper:'Supper Club',arabic:'Arabic/Emirati',indian:'Indian/S.Asian',platter:'Grazing/Platters',dessert:'Desserts',consultant:'Executive/Consultant',community:'Platform/Community',other:'Other'};
    const card=document.createElement('div');
    card.className='card';
    card.innerHTML=`
      <div class="num">#${i+1}</div>
      <a href="https://www.instagram.com/${item.u}/" target="_blank" rel="noopener">@${item.u}</a>
      <div class="desc">${item.d}</div>
      <div class="tags">
        <span class="tag ${locClass}">${locLabel}</span>
        <span class="tag">${catLabels[item.c]||item.c}</span>
      </div>`;
    grid.appendChild(card);
  });
  stats.textContent=`Showing ${list.length} of ${t.length} profiles | Connect via DM to join EatCookJoy.com`;
}
function filterCards(){
  const q=document.getElementById('search').value.toLowerCase();
  const cat=document.getElementById('catFilter').value;
  const loc=document.getElementById('locFilter').value;
  const filtered=t.filter(item=>{
    const matchQ=!q||item.u.toLowerCase().includes(q)||item.d.toLowerCase().includes(q);
    const matchCat=!cat||item.c===cat;
    const matchLoc=!loc||item.l===loc;
    return matchQ&&matchCat&&matchLoc;
  });
  renderCards(filtered);
}
renderCards(t);
</script>
