const grid = document.getElementById('grid');
const stats = document.getElementById('stats');

function renderCards(list) {
  grid.innerHTML = '';
  list.forEach((t, i) => {
    const locClass = t.l === 'dubai' ? 'dubai' : t.l === 'abudhabi' ? 'abudhabi' : 'other';
    const locLabel = t.l === 'dubai' ? 'Dubai' : t.l === 'abudhabi' ? 'Abu Dhabi' : t.l === 'sharjah' ? 'Sharjah/Ajman' : 'Other UAE';
    const catLabels = {pt:'Personal Trainer',yoga:'Yoga/Pilates',boxing:'Boxing/MMA',crossfit:'CrossFit',swimming:'Swimming',bodybuilding:'Bodybuilding',online:'Online Coach',nutrition:'Nutrition',studio:'Studio/Gym',stretch:'Stretch/Mobility',dance:'Dance/Zumba',calisthenics:'Calisthenics',other:'Other'};
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="num">#${i+1}</div>
      <a href="https://www.instagram.com/${t.u}/" target="_blank" rel="noopener">@${t.u}</a>
      <div class="desc">${t.d}</div>
      <div class="tags">
        <span class="tag ${locClass}">${locLabel}</span>
        <span class="tag">${catLabels[t.c] || t.c}</span>
      </div>
    `;
    grid.appendChild(card);
  });
  stats.textContent = `Showing ${list.length} of ${trainers.length} profiles`;
}

function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const loc = document.getElementById('locFilter').value;
  const filtered = trainers.filter(t => {
    const matchQ = !q || t.u.toLowerCase().includes(q) || t.d.toLowerCase().includes(q);
    const matchCat = !cat || t.c === cat;
    const matchLoc = !loc || t.l === loc;
    return matchQ && matchCat && matchLoc;
  });
  renderCards(filtered);
}

renderCards(trainers);
