<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Bag · azizsaifmomsworld</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500&family=Inter:wght@300;400;500;600&family=Caveat:wght@500;600&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="assets/styles.css"/>
</head>
<body data-page="cart">
<div id="site-header"></div>

<section class="page-hero">
  <span class="eyebrow">— Your bag</span>
  <h1>Shopping <em>bag</em></h1>
</section>

<div class="container">
  <div id="cart-root"></div>
</div>

<div id="site-footer"></div>
<script src="assets/partials.js"></script>
<script src="assets/shared.js"></script>
<script>
  function render() {
    const items = readCart();
    const root = document.getElementById('cart-root');
    if (!items.length) {
      root.innerHTML = `
        <div class="cart-empty">
          <h2>Your bag is empty.</h2>
          <p>Begin with a soft little favourite.</p>
          <a href="shop.html" class="btn">Discover the shop</a>
        </div>`;
      return;
    }
    const subtotal = cartTotal();
    const shipping = subtotal >= 200 ? 0 : 25;
    const vat = Math.round(subtotal * 0.05);
    const total = subtotal + shipping + vat;

    root.innerHTML = `
      <div class="cart-wrap">
        <div>
          <div class="cart-list">
            ${items.map(it => {
              const p = getProduct(it.id); if (!p) return '';
              return `
              <div class="cart-item" data-id="${p.id}" data-variant="${it.variant||''}">
                <a href="product.html?id=${p.id}" class="thumb"><img src="${p.img}" alt="${p.name}"/></a>
                <div class="info">
                  <div class="brandline">${brandName(p.brand)}</div>
                  <a href="product.html?id=${p.id}" class="name">${p.name}</a>
                  ${it.variant?`<div class="vari">${it.variant}</div>`:''}
                </div>
                <div class="right">
                  <div class="price">${aed(p.price * it.qty)}</div>
                  <div class="qty">
                    <button data-act="dec">−</button>
                    <span>${it.qty}</span>
                    <button data-act="inc">+</button>
                  </div>
                  <span class="remove" data-act="rm">Remove</span>
                </div>
              </div>`;
            }).join('')}
          </div>
        </div>
        <aside class="cart-summary">
          <h3>Order summary</h3>
          <div class="cart-row"><span>Subtotal</span><span>${aed(subtotal)}</span></div>
          <div class="cart-row"><span>Shipping (GCC)</span><span>${shipping?aed(shipping):'Free'}</span></div>
          <div class="cart-row"><span>VAT (5%)</span><span>${aed(vat)}</span></div>
          <div class="cart-row total"><span>Total</span><span>${aed(total)}</span></div>
          <button class="btn btn-block" onclick="checkout()">Proceed to checkout</button>
          <a class="ghost" href="shop.html">← Continue shopping</a>
          <p class="muted" style="font-size:11px;text-align:center;margin-top:18px">Payment gateway integration · pending</p>
        </aside>
      </div>`;

    root.querySelectorAll('.cart-item').forEach(row => {
      const id = row.dataset.id, v = row.dataset.variant;
      const cur = readCart().find(i => i.id===id && i.variant===v);
      row.querySelector('[data-act=inc]').onclick = () => { setQty(id, cur.qty+1, v); render(); };
      row.querySelector('[data-act=dec]').onclick = () => { setQty(id, cur.qty-1, v); render(); };
      row.querySelector('[data-act=rm]').onclick  = () => { removeFromCart(id, v); render(); };
    });
  }
  function checkout() { toast('Checkout — payment gateway pending'); }
  render();
  document.addEventListener('cart:change', render);
</script>
</body>
</html>
