<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pilates Instructors & Studios Across Canada - Instagram Directory</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#f0f0f0;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;min-height:100vh;display:flex;flex-direction:column}
a{color:inherit;text-decoration:none}

header{text-align:center;padding:50px 20px 30px;background:linear-gradient(135deg,#1a1a1a 0%,#0a0a0a 100%);border-bottom:1px solid #2a2a2a}
header h1{font-size:2.2rem;font-weight:700;margin-bottom:10px;background:linear-gradient(135deg,#e1306c,#405de6);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{color:#999;font-size:1.05rem;max-width:600px;margin:0 auto}

.controls{max-width:1200px;margin:30px auto 10px;padding:0 20px;display:flex;flex-wrap:wrap;gap:12px;align-items:center}
.controls input[type="text"]{flex:1;min-width:220px;padding:12px 18px;border-radius:10px;border:1px solid #333;background:#1a1a1a;color:#f0f0f0;font-size:1rem;outline:none;transition:border-color .3s}
.controls input[type="text"]:focus{border-color:#e1306c}
.controls select{padding:12px 16px;border-radius:10px;border:1px solid #333;background:#1a1a1a;color:#f0f0f0;font-size:.95rem;outline:none;cursor:pointer;transition:border-color .3s}
.controls select:focus{border-color:#405de6}

.stats{text-align:center;padding:8px 20px;color:#777;font-size:.9rem}

.grid{max-width:1200px;margin:20px auto;padding:0 20px 40px;display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}

.card{background:#1a1a1a;border-radius:14px;padding:24px;border:1px solid #2a2a2a;transition:transform .25s,border-color .25s,box-shadow .25s;display:flex;flex-direction:column;gap:12px}
.card:hover{transform:translateY(-4px);border-color:#e1306c;box-shadow:0 8px 30px rgba(225,48,108,.15)}
.card-header{display:flex;align-items:center;gap:14px}
.card-avatar{width:52px;height:52px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:1.3rem;color:#fff;flex-shrink:0}
.card-handle{font-weight:600;font-size:1.05rem;color:#f0f0f0;word-break:break-word}
.card-handle span{color:#e1306c}
.card-desc{color:#bbb;font-size:.92rem;line-height:1.5;flex-grow:1}
.card-tags{display:flex;flex-wrap:wrap;gap:8px}
.tag{padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
.tag-category{background:rgba(225,48,108,.15);color:#e1306c;border:1px solid rgba(225,48,108,.25)}
.tag-city{background:rgba(64,93,230,.15);color:#8ea4f0;border:1px solid rgba(64,93,230,.25)}
.card-link{display:inline-flex;align-items:center;gap:8px;padding:10px 20px;border-radius:10px;background:linear-gradient(135deg,#e1306c,#c13584);color:#fff;font-weight:600;font-size:.9rem;transition:opacity .25s;align-self:flex-start}
.card-link:hover{opacity:.85}
.card-link svg{width:18px;height:18px;fill:#fff}

.no-results{text-align:center;padding:60px 20px;color:#666;font-size:1.1rem;display:none}

footer{margin-top:auto;text-align:center;padding:30px 20px;border-top:1px solid #2a2a2a;color:#666;font-size:.85rem}
footer span{color:#e1306c}

@media(max-width:600px){
  header h1{font-size:1.5rem}
  .grid{grid-template-columns:1fr}
  .controls{flex-direction:column}
  .controls input[type="text"],.controls select{width:100%}
}


/* ===== FLOATING BRAND HERO ===== */
.hero-brand-section {
    position: relative;
    background: linear-gradient(135deg, #0a0a0a 0%, #111827 40%, #1a1a2e 60%, #0a0a0a 100%);
    padding: 60px 20px 35px;
    text-align: center;
    overflow: hidden;
    border-bottom: 3px solid #e1306c;
}
.hero-brand-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 600px 400px at 50% 50%, #e1306c11 0%, transparent 70%);
    pointer-events: none;
}
.hero-brand-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 900;
    color: rgba(255,255,255,0.025);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.05em;
    user-select: none;
    text-transform: uppercase;
}
.hero-brand-float {
    position: relative;
    z-index: 1;
    font-size: clamp(2.2rem, 7vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #e1306c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: brandFloat 4s ease-in-out infinite;
}
.hero-brand-section h1 {
    position: relative;
    z-index: 1;
}
.hero-brand-section .subtitle,
.hero-brand-section .sub {
    position: relative;
    z-index: 1;
}
@keyframes brandFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
</style>

const categoryColors={"reformer":"#e1306c","mat":"#405de6","clinical":"#34a853","barre":"#f77737","prenatal":"#a855f7","classical":"#06b6d4","contemporary":"#eab308","multi-style":"#ec4899"};

function avatarColor(handle){
  let h=0;for(let i=0;i<handle.length;i++)h=handle.charCodeAt(i)+((h<<5)-h);
  return `hsl(${Math.abs(h)%360},55%,45%)`;
}

function createCard(p){
  const card=document.createElement("div");
  card.className="card";
  card.dataset.handle=p.handle;
  card.dataset.category=p.category;
  card.dataset.city=p.city;
  card.dataset.search=(p.handle+" "+p.desc+" "+p.category+" "+(cityLabels[p.city]||p.city)).toLowerCase();

  const initial=p.handle.charAt(0).toUpperCase();
  card.innerHTML=`
    <div class="card-header">
      <div class="card-avatar" style="background:${avatarColor(p.handle)}">${initial}</div>
      <div class="card-handle"><span>@</span>${p.handle}</div>
    </div>
    <div class="card-desc">${p.desc}</div>
    <div class="card-tags">
      <span class="tag tag-category" style="background:${categoryColors[p.category]||'#e1306c'}22;color:${categoryColors[p.category]||'#e1306c'};border-color:${categoryColors[p.category]||'#e1306c'}44">${p.category}</span>
      <span class="tag tag-city">${cityLabels[p.city]||p.city}</span>
    </div>
    <a class="card-link" href="https://instagram.com/${p.handle}" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24"><path d="M12 2.163c3.204 0 3.584.012 4.85.07 3.252.148 4.771 1.691 4.919 4.919.058 1.265.069 1.645.069 4.849 0 3.205-.012 3.584-.069 4.849-.149 3.225-1.664 4.771-4.919 4.919-1.266.058-1.644.07-4.85.07-3.204 0-3.584-.012-4.849-.07-3.26-.149-4.771-1.699-4.919-4.92-.058-1.265-.07-1.644-.07-4.849 0-3.204.013-3.583.07-4.849.149-3.227 1.664-4.771 4.919-4.919 1.266-.057 1.645-.069 4.849-.069zM12 0C8.741 0 8.333.014 7.053.072 2.695.272.273 2.69.073 7.052.014 8.333 0 8.741 0 12c0 3.259.014 3.668.072 4.948.2 4.358 2.618 6.78 6.98 6.98C8.333 23.986 8.741 24 12 24c3.259 0 3.668-.014 4.948-.072 4.354-.2 6.782-2.618 6.979-6.98.059-1.28.073-1.689.073-4.948 0-3.259-.014-3.667-.072-4.947-.196-4.354-2.617-6.78-6.979-6.98C15.668.014 15.259 0 12 0zm0 5.838a6.162 6.162 0 100 12.324 6.162 6.162 0 000-12.324zM12 16a4 4 0 110-8 4 4 0 010 8zm6.406-11.845a1.44 1.44 0 100 2.881 1.44 1.44 0 000-2.881z"/></svg>
      View on Instagram
    </a>`;
  return card;
}

const grid=document.getElementById("grid");
const noResults=document.getElementById("noResults");
const statsEl=document.getElementById("stats");
const searchInput=document.getElementById("search");
const categoryFilter=document.getElementById("categoryFilter");
const cityFilter=document.getElementById("cityFilter");

// Deduplicate by handle
const seen=new Set();
const uniqueProfiles=profiles.filter(p=>{
  const key=p.handle.toLowerCase();
  if(seen.has(key))return false;
  seen.add(key);return true;
});

// Render all cards
uniqueProfiles.forEach(p=>grid.appendChild(createCard(p)));

function filterCards(){
  const q=searchInput.value.toLowerCase().trim();
  const cat=categoryFilter.value;
  const city=cityFilter.value;
  let visible=0;
  grid.querySelectorAll(".card").forEach(card=>{
    const matchSearch=!q||card.dataset.search.includes(q);
    const matchCat=!cat||card.dataset.category===cat;
    const matchCity=!city||card.dataset.city===city;
    const show=matchSearch&&matchCat&&matchCity;
    card.style.display=show?"":"none";
    if(show)visible++;
  });
  noResults.style.display=visible===0?"block":"none";
  statsEl.textContent=`Showing ${visible} of ${uniqueProfiles.length} studios & instructors`;
}

searchInput.addEventListener("input",filterCards);
categoryFilter.addEventListener("change",filterCards);
cityFilter.addEventListener("change",filterCards);
filterCards();
