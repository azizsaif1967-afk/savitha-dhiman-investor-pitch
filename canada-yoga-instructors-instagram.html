<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yoga Instructors & Studios Across Canada - Instagram Directory</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; padding: 20px; }
  h1 { text-align: center; color: #e1306c; margin-bottom: 5px; font-size: 1.8rem; }
  .subtitle { text-align: center; color: #888; margin-bottom: 20px; font-size: 0.9rem; }
  .stats { text-align: center; background: linear-gradient(135deg, #405de6, #e1306c); padding: 12px 20px; border-radius: 10px; margin-bottom: 20px; font-size: 1rem; font-weight: bold; color: #fff; }
  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }
  .filter-bar input { padding: 10px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.95rem; width: 300px; }
  .filter-bar select { padding: 10px 12px; border-radius: 8px; border: 1px solid #333; background: #1a1a1a; color: #fff; font-size: 0.95rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; transition: all 0.2s; }
  .card:hover { border-color: #e1306c; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(225,48,108,0.2); }
  .card .num { color: #555; font-size: 0.75rem; margin-bottom: 4px; }
  .card a { color: #e1306c; text-decoration: none; font-weight: 600; font-size: 1rem; }
  .card a:hover { text-decoration: underline; }
  .card .desc { color: #aaa; font-size: 0.8rem; margin-top: 4px; }
  .card .tags { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { background: #2a2a2a; color: #ccc; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
  .tag.loc-toronto { background: #7f1d1d; color: #fca5a5; }
  .tag.loc-vancouver { background: #1e3a5f; color: #60a5fa; }
  .tag.loc-montreal { background: #4a1d6e; color: #c084fc; }
  .tag.loc-calgary { background: #166534; color: #4ade80; }
  .tag.loc-edmonton { background: #713f12; color: #fbbf24; }
  .tag.loc-ottawa { background: #1e3a3a; color: #5eead4; }
  .tag.loc-winnipeg { background: #4a2c1a; color: #fb923c; }
  .tag.loc-halifax { background: #1a3a1a; color: #86efac; }
  .tag.loc-victoria { background: #3b1a4a; color: #d8b4fe; }
  .tag.loc-kelowna { background: #1a2e4a; color: #7dd3fc; }
  .tag.loc-saskatoon { background: #3a2a1a; color: #fcd34d; }
  .tag.loc-regina { background: #2a1a3a; color: #c4b5fd; }
  .tag.loc-quebec-city { background: #1a3a2a; color: #6ee7b7; }
  .tag.loc-whistler { background: #1a2a3a; color: #93c5fd; }
  footer { text-align: center; margin-top: 30px; color: #555; font-size: 0.8rem; padding: 20px 0; border-top: 1px solid #222; }


/* ===== FLOATING BRAND HERO ===== */
.hero-brand-section {
    position: relative;
    background: linear-gradient(135deg, #0a0a0a 0%, #111827 40%, #1a1a2e 60%, #0a0a0a 100%);
    padding: 60px 20px 35px;
    text-align: center;
    overflow: hidden;
    border-bottom: 3px solid #e1306c;
}
.hero-brand-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 600px 400px at 50% 50%, #e1306c11 0%, transparent 70%);
    pointer-events: none;
}
.hero-brand-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 900;
    color: rgba(255,255,255,0.025);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.05em;
    user-select: none;
    text-transform: uppercase;
}
.hero-brand-float {
    position: relative;
    z-index: 1;
    font-size: clamp(2.2rem, 7vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #e1306c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: brandFloat 4s ease-in-out infinite;
}
.hero-brand-section h1 {
    position: relative;
    z-index: 1;
}
.hero-brand-section .subtitle,
.hero-brand-section .sub {
    position: relative;
    z-index: 1;
}
@keyframes brandFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
</style>
</head>
<body>


<div class="hero-brand-section">

    <option value="montreal">Montreal</option>

    <option value="quebec-city">Quebec City</option>

</div>
<div class="grid" id="grid"></div>
<footer>

const seen = new Set();
const unique = profiles.filter(t => { if (seen.has(t.u)) return false; seen.add(t.u); return true; });
const grid = document.getElementById('grid');
const stats = document.getElementById('stats');
function getLocClass(l) {
  const map = {'toronto':'loc-toronto','vancouver':'loc-vancouver','montreal':'loc-montreal','calgary':'loc-calgary','edmonton':'loc-edmonton','ottawa':'loc-ottawa','winnipeg':'loc-winnipeg','halifax':'loc-halifax','victoria':'loc-victoria','kelowna':'loc-kelowna','saskatoon':'loc-saskatoon','regina':'loc-regina','quebec-city':'loc-quebec-city','whistler':'loc-whistler'};
  return map[l] || '';
}
function getLocLabel(l) {
  const map = {'toronto':'Toronto','vancouver':'Vancouver','montreal':'Montreal','calgary':'Calgary','edmonton':'Edmonton','ottawa':'Ottawa','winnipeg':'Winnipeg','halifax':'Halifax','victoria':'Victoria','kelowna':'Kelowna','saskatoon':'Saskatoon','regina':'Regina','quebec-city':'Quebec City','whistler':'Whistler'};
  return map[l] || l;
}
function getCatLabel(c) {
  const map = {'vinyasa':'Vinyasa','hatha':'Hatha','ashtanga':'Ashtanga','hot-yoga':'Hot Yoga','yin':'Yin','kundalini':'Kundalini','power':'Power','restorative':'Restorative','aerial':'Aerial','prenatal':'Prenatal','iyengar':'Iyengar','multi-style':'Multi-Style'};
  return map[c] || c;
}
function renderCards(list) {
  grid.innerHTML = '';
  list.forEach((t, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="num">#${i+1}</div><a href="https://instagram.com/${t.u}" target="_blank" rel="noopener">@${t.u}</a><div class="desc">${t.d}</div><div class="tags"><span class="tag ${getLocClass(t.l)}">${getLocLabel(t.l)}</span><span class="tag">${getCatLabel(t.c)}</span></div>`;
    grid.appendChild(card);
  });
  stats.textContent = `Showing ${list.length} of ${unique.length} yoga instructors & studios across Canada`;
}
function filterCards() {
  const q = document.getElementById('search').value.toLowerCase();
  const cat = document.getElementById('catFilter').value;
  const loc = document.getElementById('locFilter').value;
  const filtered = unique.filter(t => {
    if (q && !t.u.toLowerCase().includes(q) && !t.d.toLowerCase().includes(q)) return false;
    if (cat && t.c !== cat) return false;
    if (loc && t.l !== loc) return false;
    return true;
  });
  renderCards(filtered);
}
renderCards(unique);

</html>
