  .filter-bar { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
  .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 12px; padding: 14px 16px; transition: all 0.2s; }
  .card:hover { border-color: #e1306c; transform: translateY(-2px); box-shadow: 0 4px 15px rgba(225,48,108,0.2); }
  .card .num { color: #555; font-size: 0.75rem; margin-bottom: 4px; }
  .card a { color: #e1306c; text-decoration: none; font-weight: 600; font-size: 1rem; }
  .card a:hover { text-decoration: underline; }
  .card .desc { color: #aaa; font-size: 0.8rem; margin-top: 4px; }
  .card .tags { margin-top: 6px; display: flex; gap: 4px; flex-wrap: wrap; }
  .tag { background: #2a2a2a; color: #ccc; padding: 2px 8px; border-radius: 4px; font-size: 0.7rem; }
  .tag.loc-montreal { background: #166534; color: #4ade80; }
  .tag.loc-laval { background: #1e3a5f; color: #60a5fa; }
  .tag.loc-longueuil { background: #581c87; color: #c084fc; }
  .tag.loc-westisland { background: #854d0e; color: #fbbf24; }
  footer { text-align: center; margin-top: 30px; color: #555; font-size: 0.8rem; padding: 20px 0; border-top: 1px solid #222; }


/* ===== FLOATING BRAND HERO ===== */
.hero-brand-section {
    position: relative;
    background: linear-gradient(135deg, #0a0a0a 0%, #111827 40%, #1a1a2e 60%, #0a0a0a 100%);
    padding: 60px 20px 35px;
    text-align: center;
    overflow: hidden;
    border-bottom: 3px solid #e1306c;
}
.hero-brand-section::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 600px 400px at 50% 50%, #e1306c11 0%, transparent 70%);
    pointer-events: none;
}
.hero-brand-glow {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(4rem, 15vw, 10rem);
    font-weight: 900;
    color: rgba(255,255,255,0.025);
    white-space: nowrap;
    pointer-events: none;
    letter-spacing: 0.05em;
    user-select: none;
    text-transform: uppercase;
}
.hero-brand-float {
    position: relative;
    z-index: 1;
    font-size: clamp(2.2rem, 7vw, 4.5rem);
    font-weight: 900;
    letter-spacing: -0.01em;
    line-height: 1.1;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #e1306c 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: brandFloat 4s ease-in-out infinite;
}
.hero-brand-section h1 {
    position: relative;
    z-index: 1;
}
.hero-brand-section .subtitle,
.hero-brand-section .sub {
    position: relative;
    z-index: 1;
}
@keyframes brandFloat {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
}
</style>
</head>
